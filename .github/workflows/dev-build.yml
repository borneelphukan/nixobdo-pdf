name: Dev Build (Pre-release)

on:
  push:
    branches: [ "dev" ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dev-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable

      - name: Get current version
        id: version
        shell: pwsh
        run: |
          $cargo = Get-Content Cargo.toml -Raw
          if ($cargo -match 'version\s*=\s*"(\d+\.\d+\.\d+)"') {
            $version = $Matches[1]
            $devVersion = "$version-dev.${{ github.run_number }}"
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            echo "DEV_VERSION=$devVersion" >> $env:GITHUB_OUTPUT
            Write-Host "Dev version: $devVersion"
          }

      - name: Convert Logo to ICO
        run: magick -background none -density 256 assets\icons\logo.svg -define icon:auto-resize="256,128,64,48,32,16" assets\logo.ico

      - name: Build nixobdo-pdf
        run: cargo build --release

      - name: Download and Extract pdfium
        run: |
          Invoke-WebRequest -Uri https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz -OutFile pdfium.tgz
          tar -xzf pdfium.tgz
          Get-ChildItem -Recurse -Filter pdfium.dll | Copy-Item -Destination .

      - name: Build Installer (Inno Setup)
        run: iscc setup.iss

      - name: Rename installer for dev build
        shell: pwsh
        run: |
          Rename-Item -Path "Output\nixobdo-pdfSetup.exe" -NewName "nixobdo-pdf-dev-${{ github.run_number }}.exe"

      - name: Delete existing dev release (rolling update)
        shell: pwsh
        run: gh release delete dev --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish dev pre-release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: dev
          name: "Dev Build (latest)"
          body: |
            ⚠️ **Unstable development build — not for production use.**

            **Version:** `${{ steps.version.outputs.DEV_VERSION }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `dev`

            This release is automatically overwritten on every push to `dev`.
            For the latest stable release, see the [Releases page](../../releases/latest).
          files: Output\nixobdo-pdf-dev-${{ github.run_number }}.exe
          draft: false
          prerelease: true
          make_latest: false
