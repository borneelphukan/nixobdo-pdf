name: Release (Stable)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: windows-latest
    # Prevent re-triggering from the version bump commit
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          cache: true

      - name: Bump patch version
        id: version
        shell: pwsh
        run: |
          $cargo = Get-Content Cargo.toml -Raw
          if ($cargo -match 'version\s*=\s*"(\d+)\.(\d+)\.(\d+)"') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
            $newVersion = "$major.$minor.$patch"
            # Replace only the first occurrence (package version, not dependencies)
            # Use instance method — static [regex]::Replace has no count overload
            $regex = [regex]'(version\s*=\s*")(\d+\.\d+\.\d+)(")'
            $cargo = $regex.Replace($cargo, "`${1}$newVersion`${3}", 1)
            Set-Content Cargo.toml $cargo -NoNewline
            # Update setup.iss
            $iss = Get-Content setup.iss -Raw
            $iss = $iss -replace '(AppVersion=)(\d+\.\d+\.\d+)', "`${1}$newVersion"
            Set-Content setup.iss $iss -NoNewline
            echo "VERSION=$newVersion" >> $env:GITHUB_OUTPUT
            Write-Host "Bumped to $newVersion"
          }

      - name: Commit version bump and create PR
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $branch = "chore/bump-version-${{ steps.version.outputs.VERSION }}"
          git checkout -b $branch
          git add Cargo.toml setup.iss
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push -f -u origin $branch
          gh pr create --title "chore: bump version to ${{ steps.version.outputs.VERSION }}" --body "Automated version bump" --base main --head $branch
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Ignoring gh pr create error (PR likely already exists)"
            exit 0
          }

      - name: Convert Logo to ICO
        run: magick -background none -density 256 assets\icons\logo.svg -define icon:auto-resize="256,128,64,48,32,16" assets\logo.ico

      - name: Build nixobdo-pdf
        run: cargo build --release

      - name: Download and Extract pdfium
        run: |
          Invoke-WebRequest -Uri https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz -OutFile pdfium.tgz
          tar -xzf pdfium.tgz
          Get-ChildItem -Recurse -Filter pdfium.dll | Copy-Item -Destination .

      - name: Build Installer (Inno Setup)
        run: iscc setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: Output\nixobdo-pdfSetup.exe
          draft: false
          prerelease: false
          make_latest: true

